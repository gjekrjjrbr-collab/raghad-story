<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رهف ونجمة الفستق - هدية من حسن</title>
    
    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/TextPlugin.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f2a 0%, #0a0f2a 50%, #1a1f3a 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        /* النجوم المتحركة */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star-bubble {
            position: fixed;
            background: radial-gradient(circle, #ffd369, transparent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatStar 4s infinite;
        }

        @keyframes floatStar {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20vh) scale(1); opacity: 0; }
        }

        .story-container {
            position: relative;
            z-index: 1;
            max-width: 650px;
            margin: 0 auto;
            background: rgba(10, 15, 42, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease;
        }

        .story-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        .illustration {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, #1e2a5e, #0f0f2a);
            border-radius: 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .illustration img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 25px;
        }

        .scene-indicator {
            text-align: center;
            margin-bottom: 15px;
        }

        .scene-badge {
            background: #ffd369;
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
        }

        #story-title {
            font-size: 1.8rem;
            text-align: center;
            color: #ffd369;
            margin-bottom: 15px;
            font-weight: bold;
            min-height: 70px;
        }

        #story-text {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 25px;
            line-height: 1.7;
            font-size: 1rem;
            margin-bottom: 20px;
            text-align: right;
            min-height: 200px;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background: linear-gradient(135deg, #ffd369, #ffaa00);
            border: none;
            padding: 14px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            text-align: center;
        }

        button:hover {
            transform: scale(0.98);
            box-shadow: 0 5px 15px rgba(255, 211, 105, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .read-more {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 211, 105, 0.2);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid #ffd369;
        }

        .read-more:hover {
            background: rgba(255, 211, 105, 0.4);
        }

        .hidden {
            display: none;
        }

        .kiss-option {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            margin-top: 10px;
        }

        .response-message {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            .story-container {
                padding: 15px;
            }
            .illustration {
                height: 180px;
            }
            #story-title {
                font-size: 1.4rem;
            }
            #story-text {
                font-size: 0.9rem;
                padding: 15px;
            }
            button {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

    function createStars() {
        const starsContainer = document.getElementById('stars');

            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';

            bubble.style.animationDelay = Math.random() * 5 + 's';

    // ============================================
    // دوال إرسال رسالة تيليجرام
    // ============================================
    
    async function sendTelegramMessage(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const data = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'HTML'
        };
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            console.log('Telegram message sent:', result);
            return result.ok;
        } catch (error) {
            console.error('Error sending telegram message:', error);
            return false;
        }
    }
    
    // ============================================
    // عرض المشاهد مع تأثيرات GSAP
    // ============================================
    
    function showScene(sceneId, fromKiss = false) {
        const scene = scenes[sceneId];
        if (!scene) return;
        
        // تأثير اختفاء ثم ظهور
        gsap.to("#story-text", {
            duration: 0.3,
            opacity: 0,
            y: 10,
            onComplete: () => {
                document.getElementById('scene-badge').textContent = scene.name;
                document.getElementById('story-title').innerHTML = scene.name.split(':')[1] || scene.name;
                document.getElementById('story-text').innerHTML = scene.text;
                document.getElementById('sceneImage').src = scene.image;
                
                gsap.to("#story-text", {
                    duration: 0.5,
                    opacity: 1,
                    y: 0,
                    delay: 0.1
                });
            }
        });
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        
        if (scene.choices.length > 0) {
            scene.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.textContent = choice.text;
                btn.onclick = () => showScene(choice.next);
                choicesDiv.appendChild(btn);
            });
        } else {
            // نهاية القصة - نضيف زر "قراءة المزيد"
            const readMoreDiv = document.createElement('div');
            readMoreDiv.className = 'read-more';
            readMoreDiv.innerHTML = '📖 قراءة المزيد...';
            readMoreDiv.onclick = showFinalOptions;
            choicesDiv.appendChild(readMoreDiv);
        }
        
        // تأثير GSAP على الأزرار الجديدة
        gsap.fromTo(".choices button, .read-more", 
            { opacity: 0, y: 20 },
            { opacity: 1, y: 0, stagger: 0.1, duration: 0.5 }
        );
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    // ============================================

        const choicesDiv = document.getElementById('choices');
        
        gsap.to("#choices", {
            duration: 0.3,
            opacity: 0,
            onComplete: () => {
                choicesDiv.innerHTML = '';
                
                const kissBtn = document.createElement('button');
                kissBtn.className = 'kiss-option';
                kissBtn.innerHTML = '🌸 شنو رائيج نبوس حسن؟ 🌸';
                kissBtn.onclick = () => showKissResponse(true);
                choicesDiv.appendChild(kissBtn);
                
                const noBtn = document.createElement('button');
                noBtn.innerHTML = '💋 هاي احلى بوسه من رفرف لحسن 💋';
                noBtn.onclick = () => showKissResponse(false);
                choicesDiv.appendChild(noBtn);
                
                gsap.to("#choices", { duration: 0.3, opacity: 1 });

                restartBtn.onclick = () => showScene('start');
                choicesDiv.appendChild(restartBtn);
                
                gsap.to("#story-text", { duration: 0.5, opacity: 1, y: 0 });
                gsap.to("#choices", { duration: 0.3, opacity: 1 });
            }});
        } else {
            gsap.to("#choices", { duration: 0.3, opacity: 0 });
            gsap.to("#story-text", { duration: 0.3, opacity: 0, y: 10, onComplete: () => {
                storyText.innerHTML = '🌸 رهف: "حسن، أنت صديق رائع وأقدر صداقتنا كثيراً. دعنا نبقى أصدقاء ونستمتع بذكرياتنا الجميلة معاً. شكراً لك على هذه الهدية الرائعة!" 🌸';
                choicesDiv.innerHTML = '';
                
                const restartBtn = document.createElement('button');
                restartBtn.innerHTML = '🔄 أعيدي قراءة القصة من البداية';
                restartBtn.onclick = () => showScene('start');
                choicesDiv.appendChild(restartBtn);
                
                gsap.to("#story-text", { duration: 0.5, opacity: 1, y: 0 });
                gsap.to("#choices", { duration: 0.3, opacity: 1 });
            }});
        }
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    
    // بدء القصة
    showScene('start');
</script>
</body>
</html>
