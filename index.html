<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>قلب حسن .. يارهف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Tahoma', 'Geeza Pro', system-ui, sans-serif;
            padding: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 2rem 1.5rem 2.8rem;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.2s ease;
        }

        /* حاوية القلب */
        .heart-container {
            margin: 1.8rem 0 1.5rem;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .heart-container:active {
            transform: scale(0.96);
        }

        /* شكل القلب SVG (طبيعي) */
        .heart-svg {
            width: 200px;
            height: 200px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
            transition: all 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
        }
        
        /* الصورة التي ستظهر بعد الكسر (مخفية في البداية) */
        .broken-heart-img {
            width: 220px;
            height: auto;
            display: none;  /* تظهر فقط عند الكسر */
            animation: fadeScale 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            margin: 0 auto;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
            border-radius: 20px;
        }

        .action-text {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 1rem 0 0.5rem;
            color: #fff0e0;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }

        .click-counter {
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffd966;
            margin-top: 0.5rem;
            backdrop-filter: blur(4px);
        }

        .broken-message {
            margin-top: 1.8rem;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffb7b7;
            background: rgba(0,0,0,0.4);
            padding: 1rem;
            border-radius: 50px;
            animation: fadeScale 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeScale {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .hint {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255,255,200,0.4);
        }

        footer {
            margin-top: 2rem;
            font-size: 0.7rem;
            opacity: 0.6;
            color: #ccc;
        }
        
        .reset-btn {
            background: #2c2c4e;
            border: none;
            color: #ffc8a2;
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .reset-btn:hover {
            background: #3d3d6b;
            color: white;
        }
    </style>
</head>
<body>

<div class="card" id="app">
    <!-- القلب القابل للنقر (SVG) + الصورة المخفية -->
    <div class="heart-container" id="heartClickZone">
        <svg class="heart-svg" id="heartSVG" viewBox="0 0 100 100" fill="currentColor">
            <path d="M50,88.5 C50,88.5 12,58 12,38 C12,23 22,13 36,13 C44,13 48,20 50,20 C52,20 56,13 64,13 C78,13 88,23 88,38 C88,58 50,88.5 50,88.5Z" />
        </svg>
        <img id="brokenImg" class="broken-heart-img" src="https://l.top4top.io/p_3768fkm471.jpg" alt="قلب مكسور">
    </div>
    
    <div class="action-text" id="actionMessage">اضغط على القلب</div>
    <div class="click-counter" id="clickCounterDisplay">0</div>
    
    <div id="surpriseZone"></div>
    
    <div class="hint">💖 اضغط على القلب 💖</div>
    <footer>لـ .. من حسن</footer>
</div>

<script>
    (function(){
        let clickCount = 0;
        let isBroken = false;
        let targetClicks = 0;
        
        const heartContainer = document.getElementById('heartClickZone');
        const heartSVG = document.getElementById('heartSVG');
        const brokenImg = document.getElementById('brokenImg');
        const actionMsg = document.getElementById('actionMessage');
        const counterDisplay = document.getElementById('clickCounterDisplay');
        const surpriseZone = document.getElementById('surpriseZone');
        
        function resetGame(keepBroken = false) {
            if(!keepBroken) {
                isBroken = false;
                clickCount = 0;
                targetClicks = Math.floor(Math.random() * 3) + 3;
                
                // إظهار SVG وإخفاء الصورة
                heartSVG.style.display = "block";
                brokenImg.style.display = "none";
                heartSVG.style.color = "#ff3b3b";
                heartSVG.style.filter = "drop-shadow(0 5px 12px #ff3b3baa)";
                surpriseZone.innerHTML = '';
                actionMsg.innerHTML = "اضغط على القلب 💓";
                counterDisplay.innerHTML = `0`;
            } else {
                isBroken = true;
                heartSVG.style.display = "none";
                brokenImg.style.display = "block";
                actionMsg.innerHTML = "💔 القلب مكسور 💔";
                counterDisplay.innerHTML = `${clickCount}`;
                surpriseZone.innerHTML = `
                    <div class="broken-message">
                        💔 قلب حسن مكسور... يارهف 💔
                    </div>
                    <button class="reset-btn" id="resetHeartBtn">🔄 حاول مجدداً؟</button>
                `;
                const resetBtn = document.getElementById('resetHeartBtn');
                if(resetBtn) {
                    resetBtn.addEventListener('click', () => {
                        resetGame(false);
                    });
                }
            }
        }
        
        function breakHeart() {
            if(isBroken) return;
            isBroken = true;
            
            // إخفاء SVG وإظهار الصورة المكسورة
            heartSVG.style.display = "none";
            brokenImg.style.display = "block";
            actionMsg.innerHTML = "💔 لقد انكسر 💔";
            counterDisplay.innerHTML = `${clickCount}`;
            
            surpriseZone.innerHTML = `
                <div class="broken-message">
                    💔 قلب حسن مكسور... يارهف 💔
                </div>
                <button class="reset-btn" id="resetHeartBtn">♻️ إعادة المحاولة</button>
            `;
            const resetBtn = document.getElementById('resetHeartBtn');
            if(resetBtn) {
                resetBtn.addEventListener('click', () => {
                    resetGame(false);
                });
            }
        }
        
        function handleHeartClick() {
            if(isBroken) return;
            clickCount++;
            counterDisplay.innerHTML = `${clickCount}`;
            
            heartContainer.style.transform = "scale(0.97)";
            setTimeout(() => {
                if(heartContainer) heartContainer.style.transform = "";
            }, 120);
            
            if(clickCount >= targetClicks) {
                breakHeart();
            }
        }
        
        function init() {
            resetGame(false);
            heartContainer.addEventListener('click', handleHeartClick);
        }
        
        init();
    })();
</script>
</body>
</html>
